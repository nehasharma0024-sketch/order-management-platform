<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Order Tracker</title>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #Fdfbf7; 
            color: #292524;
        }
        
        /* Custom delicate scrollbar for the table */
        .table-container::-webkit-scrollbar { 
            height: 6px; 
            width: 6px; 
        }
        .table-container::-webkit-scrollbar-track { 
            background: transparent; 
        }
        .table-container::-webkit-scrollbar-thumb { 
            background: #e7e5e4; 
            border-radius: 10px; 
        }
        .table-container::-webkit-scrollbar-thumb:hover { 
            background: #d6d3d1; 
        }
        
        /* Animation for modals */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        let firebaseConfig = {};
        try { firebaseConfig = JSON.parse(firebaseConfigStr); } catch (e) {}
        
        const isFirebaseConfigured = !!firebaseConfig.apiKey;
        
        let app, auth, db;
        if (isFirebaseConfigured) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const PlusIcon = ({ className }) => (
            <svg className={className || "w-5 h-5"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const DownloadIcon = ({ className }) => (
            <svg className={className || "w-5 h-5"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        );

        const DollarSignIcon = ({ className }) => (
            <svg className={className || "w-6 h-6"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const ShoppingCartIcon = ({ className }) => (
            <svg className={className || "w-6 h-6"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
        );

        const PackageIcon = ({ className }) => (
            <svg className={className || "w-6 h-6"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
        );

        const TrendingUpIcon = ({ className }) => (
            <svg className={className || "w-6 h-6"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        );

        const TrashIcon = ({ className }) => (
            <svg className={className || "w-5 h-5"} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const StatCard = ({ title, value, icon, subtitle }) => (
            <div className="bg-white p-6 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] border border-stone-100 flex items-center space-x-4 transition-transform hover:-translate-y-1 duration-300">
                <div className="p-3 bg-stone-50 rounded-xl text-stone-600">
                    {icon}
                </div>
                <div>
                    <p className="text-sm font-medium text-stone-500">{title}</p>
                    <h3 className="text-2xl font-bold text-stone-800">{value}</h3>
                    {subtitle && <p className="text-xs text-stone-400 mt-1">{subtitle}</p>}
                </div>
            </div>
        );

        const ConfirmDeleteModal = ({ isOpen, onClose, onConfirm }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden p-6 text-center modal-animate">
                        <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-rose-50 mb-4">
                            <TrashIcon className="h-6 w-6 text-rose-500" />
                        </div>
                        <h3 className="text-lg font-semibold text-stone-900 mb-2">Delete Order</h3>
                        <p className="text-sm text-stone-500 mb-6">Are you sure you want to delete this order? This action cannot be undone.</p>
                        <div className="flex justify-center space-x-3">
                            <button onClick={onClose} className="px-4 py-2 bg-white text-stone-700 font-medium border border-stone-200 rounded-xl hover:bg-stone-50 transition-colors">Cancel</button>
                            <button onClick={onConfirm} className="px-4 py-2 bg-rose-500 text-white font-medium rounded-xl hover:bg-rose-600 transition-colors shadow-sm">Delete Order</button>
                        </div>
                    </div>
                </div>
            );
        };

        const OrderFormModal = ({ isOpen, onClose, onSave }) => {
            // Keep numerical values as strings in state to make typing easier
            const [formData, setFormData] = React.useState({
                date: new Date().toISOString().split('T')[0],
                customerName: '',
                itemName: '',
                quantity: '1',
                price: '0',
                source: 'Instagram'
            });

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({ 
                    ...formData, 
                    id: Date.now(),
                    quantity: parseInt(formData.quantity, 10) || 1,
                    price: parseFloat(formData.price) || 0
                });
                onClose();
                // Reset form for next use
                setFormData({
                    date: new Date().toISOString().split('T')[0],
                    customerName: '',
                    itemName: '',
                    quantity: '1',
                    price: '0',
                    source: 'Instagram'
                });
            };

            return (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-animate border border-stone-100">
                        <div className="px-6 py-4 border-b border-stone-100 flex justify-between items-center bg-stone-50/50">
                            <h2 className="text-lg font-bold text-stone-800">Record New Order</h2>
                            <button onClick={onClose} className="text-stone-400 hover:text-stone-600 transition-colors p-1 bg-white rounded-full border border-stone-100">
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium text-stone-700 mb-1">Customer Name</label>
                                    <input required type="text" 
                                        className="w-full px-3 py-2 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-800/20 focus:border-stone-800 transition-all bg-stone-50 focus:bg-white" 
                                        value={formData.customerName} 
                                        onChange={e => setFormData({...formData, customerName: e.target.value})} 
                                        placeholder="e.g. Jane Doe" />
                                </div>
                                
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium text-stone-700 mb-1">Item Description</label>
                                    <input required type="text" 
                                        className="w-full px-3 py-2 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-800/20 focus:border-stone-800 transition-all bg-stone-50 focus:bg-white" 
                                        value={formData.itemName} 
                                        onChange={e => setFormData({...formData, itemName: e.target.value})} 
                                        placeholder="e.g. 8x10 Watercolor Landscape" />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-stone-700 mb-1">Total Pieces</label>
                                    <input required type="number" min="1" 
                                        className="w-full px-3 py-2 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-800/20 focus:border-stone-800 transition-all bg-stone-50 focus:bg-white" 
                                        value={formData.quantity} 
                                        onChange={e => setFormData({...formData, quantity: e.target.value})} />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-stone-700 mb-1">Price per Item ($)</label>
                                    <input required type="number" min="0" step="0.01" 
                                        className="w-full px-3 py-2 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-800/20 focus:border-stone-800 transition-all bg-stone-50 focus:bg-white" 
                                        value={formData.price} 
                                        onChange={e => setFormData({...formData, price: e.target.value})} />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-stone-700 mb-1">Order Source</label>
                                    <select 
                                        className="w-full px-3 py-2 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-800/20 focus:border-stone-800 transition-all bg-stone-50 focus:bg-white" 
                                        value={formData.source} 
                                        onChange={e => setFormData({...formData, source: e.target.value})}>
                                        <option>Instagram</option>
                                        <option>Etsy</option>
                                        <option>Personal Website</option>
                                        <option>Facebook</option>
                                        <option>In-Person / Craft Fair</option>
                                        <option>Other</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-stone-700 mb-1">Order Date</label>
                                    <input required type="date" 
                                        className="w-full px-3 py-2 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-800/20 focus:border-stone-800 transition-all bg-stone-50 focus:bg-white" 
                                        value={formData.date} 
                                        onChange={e => setFormData({...formData, date: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className="pt-4 flex justify-end space-x-3 border-t border-stone-100 mt-6">
                                <button type="button" onClick={onClose} className="px-5 py-2.5 text-sm text-stone-600 font-medium hover:bg-stone-100 rounded-xl transition-colors">Cancel</button>
                                <button type="submit" className="px-5 py-2.5 text-sm bg-stone-800 text-white font-medium hover:bg-stone-900 rounded-xl transition-colors shadow-md shadow-stone-800/20 flex items-center">
                                    <PlusIcon className="w-4 h-4 mr-1.5" />
                                    Save Order
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            )
        };

        const App = () => {
            const [orders, setOrders] = React.useState([]);
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [showForm, setShowForm] = React.useState(false);
            const [deleteConfirmId, setDeleteConfirmId] = React.useState(null);

            React.useEffect(() => {
                if (!isFirebaseConfigured) {
                    setUser({ uid: 'local-user' });
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user || !isFirebaseConfigured) return;
                
                const ordersRef = collection(db, 'artifacts', appId, 'users', user.uid, 'orders');
                
                const unsubscribe = onSnapshot(ordersRef, (snapshot) => {
                    const fetchedOrders = [];
                    snapshot.forEach((doc) => {
                        fetchedOrders.push({ ...doc.data(), id: doc.id });
                    });
                    setOrders(fetchedOrders);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore subscription error:", error);
                    setLoading(false);
                });
                
                return () => unsubscribe();
            }, [user]);

            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, order) => sum + (order.quantity * order.price), 0);
            const totalPieces = orders.reduce((sum, order) => sum + order.quantity, 0);
            
            // Find most frequent source
            const sourceCounts = orders.reduce((acc, order) => {
                acc[order.source] = (acc[order.source] || 0) + 1;
                return acc;
            }, {});
            
            let topSource = "N/A";
            let maxCount = 0;
            for (const [source, count] of Object.entries(sourceCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    topSource = source;
                }
            }

            // Function to find how many times a customer has ordered
            const getCustomerOrderCount = (customerName) => {
                if(!customerName) return 0;
                return orders.filter(o => o.customerName.toLowerCase().trim() === customerName.toLowerCase().trim()).length;
            };

            const handleExportCSV = () => {
                const headers = ["Order ID,Date,Customer Name,Item Name,Quantity,Price per Item,Total Price,Source"];
                
                const rows = orders.map(order => {
                    // Properly escape strings that might contain commas for the CSV format
                    const escape = (text) => `"${String(text || '').replace(/"/g, '""')}"`;
                    const total = (order.quantity * order.price).toFixed(2);
                    return `${order.id},${order.date},${escape(order.customerName)},${escape(order.itemName)},${order.quantity},${order.price},${total},${escape(order.source)}`;
                });
                
                const csvContent = headers.concat(rows).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', `Art_Studio_Orders_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const confirmDelete = (id) => {
                setDeleteConfirmId(id);
            };

            const executeDelete = async () => {
                if (deleteConfirmId !== null) {
                    if (!isFirebaseConfigured) {
                        setOrders(prev => prev.filter(o => o.id !== deleteConfirmId));
                        setDeleteConfirmId(null);
                        return;
                    }
                    if (user) {
                        const orderRef = doc(db, 'artifacts', appId, 'users', user.uid, 'orders', String(deleteConfirmId));
                        try {
                            await deleteDoc(orderRef);
                            setDeleteConfirmId(null);
                        } catch (error) {
                            console.error("Error deleting order:", error);
                        }
                    }
                }
            };

            const saveOrder = async (newOrder) => {
                if (!isFirebaseConfigured) {
                    setOrders(prev => [...prev, newOrder]);
                    return;
                }
                if (!user) return;
                const orderId = String(newOrder.id);
                const orderRef = doc(db, 'artifacts', appId, 'users', user.uid, 'orders', orderId);
                try {
                    await setDoc(orderRef, newOrder);
                } catch (error) {
                    console.error("Error saving order:", error);
                }
            };

            return (
                <div className="min-h-screen pb-16">
                    {/* Top Navigation */}
                    <header className="bg-white border-b border-stone-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-stone-100 rounded-xl flex items-center justify-center text-stone-800 border border-stone-200 shadow-sm">
                                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-stone-800 leading-tight">Studio Tracker</h1>
                                    <p className="text-[10px] uppercase tracking-wider text-stone-400 font-semibold">Artist Order Management</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-3">
                                <button onClick={handleExportCSV} className="flex items-center px-4 py-2 text-sm font-medium text-stone-600 bg-white border border-stone-200 hover:bg-stone-50 rounded-xl shadow-[0_1px_2px_rgba(0,0,0,0.05)] transition-colors">
                                    <DownloadIcon className="w-4 h-4 mr-2" />
                                    Export to CSV
                                </button>
                                <button onClick={() => setShowForm(true)} className="flex items-center px-4 py-2 text-sm font-medium text-white bg-stone-800 hover:bg-stone-900 rounded-xl shadow-md shadow-stone-800/20 transition-all hover:scale-105 active:scale-95">
                                    <PlusIcon className="w-4 h-4 mr-1.5" />
                                    New Order
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                        
                        {/* Statistics Dashboard */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
                            <StatCard title="Total Revenue" value={`$${totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`} icon={<DollarSignIcon />} subtitle="All time earnings" />
                            <StatCard title="Total Orders" value={totalOrders} icon={<ShoppingCartIcon />} subtitle="Individual sales transactions" />
                            <StatCard title="Pieces Sold" value={totalPieces} icon={<PackageIcon />} subtitle="Total physical items crafted" />
                            <StatCard title="Top Source" value={topSource} icon={<TrendingUpIcon />} subtitle="Most popular platform" />
                        </div>

                        {/* Order History Sheet */}
                        <div className="bg-white border border-stone-200 rounded-2xl shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] overflow-hidden">
                            <div className="px-6 py-5 border-b border-stone-100 flex items-center justify-between bg-white">
                                <h2 className="text-lg font-bold text-stone-800">Order History Sheet</h2>
                                <span className="px-3 py-1 bg-stone-100 text-stone-600 text-xs font-semibold rounded-full border border-stone-200">
                                    {orders.length} Records
                                </span>
                            </div>
                            
                            <div className="overflow-x-auto table-container">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-stone-50 text-stone-500 text-[11px] uppercase tracking-wider font-bold border-b border-stone-100">
                                            <th className="px-6 py-4">Order Date</th>
                                            <th className="px-6 py-4">Customer</th>
                                            <th className="px-6 py-4">Item Details</th>
                                            <th className="px-6 py-4 text-right">Pieces</th>
                                            <th className="px-6 py-4 text-right">Price/Item</th>
                                            <th className="px-6 py-4 text-right">Total</th>
                                            <th className="px-6 py-4">Source</th>
                                            <th className="px-6 py-4 text-center">Manage</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100/80 bg-white">
                                    {loading ? (
                                        <tr>
                                            <td colSpan="8" className="px-6 py-16 text-center text-stone-500 bg-stone-50/30">
                                                <div className="flex flex-col items-center justify-center animate-pulse">
                                                    <p className="text-base font-medium text-stone-800">Loading your orders...</p>
                                                </div>
                                            </td>
                                        </tr>
                                    ) : orders.length === 0 ? (
                                        <tr>
                                            <td colSpan="8" className="px-6 py-16 text-center text-stone-500 bg-stone-50/30">
                                                <div className="flex flex-col items-center justify-center">
                                                        <div className="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mb-4 text-stone-400">
                                                            <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                            </svg>
                                                        </div>
                                                        <p className="text-base font-medium text-stone-800">Your canvas is blank</p>
                                                        <p className="text-sm mt-1 mb-4">Click "New Order" to record your first sale.</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            orders.sort((a,b) => new Date(b.date) - new Date(a.date)).map(order => {
                                                const customerOrders = getCustomerOrderCount(order.customerName);
                                                return (
                                                    <tr key={order.id} className="hover:bg-stone-50/70 transition-colors group">
                                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-stone-500 font-medium">
                                                            {new Date(order.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap">
                                                            <div className="text-sm font-semibold text-stone-800">{order.customerName}</div>
                                                            {customerOrders > 1 && (
                                                                <div className="text-[10px] text-stone-500 font-medium uppercase tracking-wider mt-0.5 flex items-center">
                                                                    <svg className="w-3 h-3 mr-1 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
                                                                        <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                                                    </svg>
                                                                    {customerOrders} Orders total
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="px-6 py-4 text-sm text-stone-600 max-w-xs truncate font-medium">
                                                            {order.itemName}
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-stone-600 text-right font-medium">
                                                            <span className="px-2 py-1 bg-stone-100 rounded-md">{order.quantity}</span>
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-stone-500 text-right">
                                                            ${order.price.toFixed(2)}
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-emerald-600 text-right">
                                                            ${(order.quantity * order.price).toFixed(2)}
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                            <span className="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold bg-stone-100 text-stone-700 border border-stone-200">
                                                                {order.source}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-center">
                                                            <button 
                                                                onClick={() => confirmDelete(order.id)} 
                                                                className="text-stone-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all focus:opacity-100 p-1.5 rounded-lg hover:bg-rose-50" 
                                                                title="Delete Order">
                                                                <TrashIcon />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                {/* Modals */}
                <OrderFormModal 
                    isOpen={showForm} 
                    onClose={() => setShowForm(false)} 
                    onSave={saveOrder} 
                />

                <ConfirmDeleteModal
                    isOpen={deleteConfirmId !== null}
                    onClose={() => setDeleteConfirmId(null)}
                    onConfirm={executeDelete}
                />
            </div>
        )
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
